<!DOCTYPE html>

<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">


<h2>Edit Student</h2>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name"
               value="{{ student.name }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email"
               value="{{ student.email }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Phone</label>
        <input type="text" name="phone"
               value="{{ student.phone }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Course</label>
        <input type="text" name="course"
               value="{{ student.course }}"
               class="form-control">
    </div>

    <button type="submit"
            class="btn btn-success">
        Update Student
    </button>

    <a href="/dashboard/"
       class="btn btn-secondary">
        Back
    </a>

</form>


</div>

</body>
</html>
