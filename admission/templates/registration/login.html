<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:380px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .login-card h2{
            text-align:center;
            color:#333;
            margin-bottom:10px;
        }

        .login-card p.subtitle{
            text-align:center;
            color:#777;
            margin-bottom:25px;
        }

        form p{
            margin-bottom:18px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:6px;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            transition:.3s;
        }

        input:focus{
            outline:none;
            border-color:#4f46e5;
            box-shadow:0 0 5px rgba(79,70,229,.4);
        }

        button{
            width:100%;
            padding:12px;
            background:#4f46e5;
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#4338ca;
        }

        .signup{
            text-align:center;
            margin-top:20px;
            color:#555;
        }

        .signup a{
            color:#4f46e5;
            text-decoration:none;
            font-weight:bold;
        }

        .signup a:hover{
            text-decoration:underline;
        }

        .logo{
            text-align:center;
            font-size:45px;
            margin-bottom:15px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">🔐</div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your account</p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <div class="signup">
        Don't have an account?
        <a href="/signup/">Create Account</a>
    </div>

</div>

</body>
</html>
